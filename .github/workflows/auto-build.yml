name: Auto-build on upstream release

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest upstream YTLite release
        id: upstream
        run: |
          tag=$(curl -fsSL https://api.github.com/repos/dayanch96/YTLite/releases/latest | jq -r .tag_name)
          ver=${tag#v}
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ver=$ver" >> "$GITHUB_OUTPUT"

      - name: Check if we've already built this tweak version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release list --repo "$GITHUB_REPOSITORY" --limit 50 --json name -q '.[].name' \
               | grep -qF "v${{ steps.upstream.outputs.ver }} "; then
            echo "Already built tweak v${{ steps.upstream.outputs.ver }}"
            echo "build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tweak v${{ steps.upstream.outputs.ver }} not yet built"
            echo "build=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger main build workflow
        if: steps.check.outputs.build == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run main.yml \
            --repo "$GITHUB_REPOSITORY" \
            -f ipa_url="${{ secrets.DECRYPTED_YT_URL }}" \
            -f tweak_version="${{ steps.upstream.outputs.ver }}" \
            -f bundle_id="com.google.ios.youtube" \
            -f display_name="YouTube" \
            -f enable_youpip=true \
            -f enable_ytuhd=true \
            -f enable_yq=true \
            -f enable_ryd=true \
            -f enable_ytabc=true \
            -f enable_demc=false
