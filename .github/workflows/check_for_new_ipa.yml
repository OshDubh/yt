name: Check if a new YouTube IPA is available

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Compare versions
        run: |
          appstore=$(curl -s "https://itunes.apple.com/lookup?id=544007664" | jq -r '.results[0].version')
          current=$(curl -s "https://raw.githubusercontent.com/${{ github.repository }}/main/source.json" | jq -r '.apps[0].versions[0].version')

          norm() { echo "$1" | awk -F. '{printf "%d.%d.%d", $1, $2, ($3==""?0:$3)}'; }
          a=$(norm "$appstore")
          c=$(norm "$current")

          echo "App Store: $appstore  ($a)"
          echo "Source:    $current   ($c)"

          if [ "$a" = "$c" ]; then
            echo "::notice::Up to date."
            exit 0
          fi

          echo "::error title=YT IPA update needed::App Store YouTube is now ${appstore} but source ships ${current}. Replace https://cdn.osh.dev/dev.osh.yt.ipa with the new decrypted IPA, then run main.yml."
          exit 1
